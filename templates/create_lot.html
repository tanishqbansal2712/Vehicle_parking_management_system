<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Parking Lot - Vehicle Parking App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            background-color: #f4f7f5;
            font-family: 'Poppins', sans-serif;
            color: #1b1b1b;
            padding: 40px 0;
        }
        h2 {
            color: #2e7d32;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
        }
        form {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(46, 125, 50, 0.2);
        }
        label {
            font-weight: 600;
            color: #4a794a;
        }
        input.form-control {
            border-radius: 8px;
            border: 1.5px solid #a5d6a7;
            transition: border-color 0.3s ease;
        }
        input.form-control:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 8px #81c784;
            outline: none;
        }
        .btn-success {
            background-color: #2e7d32;
            border: none;
            padding: 12px 30px;
            font-weight: 700;
            border-radius: 30px;
            transition: background-color 0.3s ease;
            display: block;
            width: 100%;
            margin-top: 20px;
        }
        .btn-success:hover {
            background-color: #66bb6a;
            box-shadow: 0 0 15px #66bb6a;
        }
        @media (max-width: 576px) {
            form {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <h2>Create Parking Lot</h2>
    <form method="POST" novalidate>
        <div class="mb-3">
            <label for="name">Lot Name</label>
            <input id="name" name="name" class="form-control" required />
        </div>
        <div class="mb-3">
            <label for="address">Address</label>
            <input id="address" name="address" class="form-control" required />
        </div>
        <div class="mb-3">
            <label for="pincode">Pin Code</label>
            <input id="pincode" name="pincode" class="form-control" required />
        </div>
        <div class="mb-3">
            <label for="price_per_hour">Price per Hour</label>
            <input id="price_per_hour" name="price_per_hour" type="number" step="0.1" class="form-control" required />
        </div>
        <div class="mb-3">
            <label for="max_spots">Number of Spots</label>
            <input id="max_spots" name="max_spots" type="number" class="form-control" required />
        </div>
        <button class="btn btn-success" type="submit">Create</button>
    </form>

</body>
</html>
